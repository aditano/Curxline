<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenRouter Model Lab</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232f7f72'/%3E%3Cpath d='M16 36h32v8H16zm0-16h20v8H16z' fill='white'/%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: light;
      --ink: #17211d;
      --muted: #62706a;
      --paper: #f7f8f4;
      --panel: #ffffff;
      --line: #dce3dc;
      --soft: #edf2ec;
      --mint: #2f7f72;
      --mint-dark: #1e5e54;
      --coral: #d85e3f;
      --plum: #704c7c;
      --gold: #bc872b;
      --danger: #b83a3a;
      --shadow: 0 18px 50px rgba(23, 33, 29, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled,
    input:disabled,
    select:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 24px clamp(18px, 4vw, 44px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .eyebrow {
      color: var(--mint-dark);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      margin: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.03;
      margin-bottom: 0;
      letter-spacing: 0;
    }

    h2 {
      font-size: 17px;
      margin-bottom: 14px;
    }

    h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      border-radius: 999px;
      padding: 6px 12px;
      background: var(--soft);
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
    }

    .pill.running::before {
      background: var(--mint);
      box-shadow: 0 0 0 5px rgba(47, 127, 114, 0.14);
    }

    .pill.error::before {
      background: var(--danger);
    }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 22px;
      padding: 22px clamp(18px, 4vw, 44px) 40px;
      align-items: start;
    }

    .controls {
      display: grid;
      gap: 16px;
      position: sticky;
      top: 118px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel.compact {
      padding: 14px;
      box-shadow: none;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(47, 127, 114, 0.14);
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    .key-options {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: -4px 0 14px;
    }

    .checkbox-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      text-transform: none;
      font-size: 13px;
      font-weight: 700;
    }

    .checkbox-line input {
      width: 16px;
      height: 16px;
      min-height: 16px;
      padding: 0;
      accent-color: var(--mint);
    }

    .btn {
      min-height: 42px;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--ink);
      color: white;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(23, 33, 29, 0.16);
    }

    .btn.secondary {
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn.accent {
      background: var(--mint);
    }

    .btn.warn {
      background: var(--danger);
    }

    .btn.small {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 5px;
      background: var(--soft);
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label {
      min-height: 38px;
      border-radius: 7px;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 12px;
      text-transform: none;
      font-weight: 850;
      cursor: pointer;
    }

    .segmented input:checked + label {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 4px 16px rgba(23, 33, 29, 0.10);
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      min-height: 104px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      display: grid;
      align-content: space-between;
    }

    .metric strong {
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .main {
      display: grid;
      gap: 16px;
      min-width: 0;
    }

    .progress-shell {
      height: 12px;
      background: var(--soft);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--mint), var(--coral));
      transition: width 0.25s ease;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.55fr);
      gap: 16px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .category-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--panel);
      min-height: 122px;
    }

    .category-card strong {
      display: block;
      font-size: 25px;
      margin: 8px 0 2px;
    }

    .category-card p,
    .task-card p,
    .narrative p,
    .model-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 0;
    }

    .category-card .bar {
      height: 7px;
      background: var(--soft);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 10px;
    }

    .category-card .bar i {
      display: block;
      height: 100%;
      width: var(--value, 0%);
      background: var(--mint);
    }

    .category-card.weak .bar i {
      background: var(--danger);
    }

    .category-card.strong .bar i {
      background: var(--plum);
    }

    .narrative {
      display: grid;
      gap: 12px;
    }

    .callout {
      border-left: 4px solid var(--mint);
      background: #f6fbf8;
      padding: 13px 14px;
      border-radius: 0 8px 8px 0;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }

    .callout.bad {
      border-left-color: var(--danger);
      background: #fff7f6;
    }

    .callout.note {
      border-left-color: var(--gold);
      background: #fffaf0;
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .task-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .task-title {
      display: grid;
      gap: 4px;
    }

    .task-title b {
      font-size: 14px;
    }

    .task-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .score-badge {
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--soft);
      color: var(--ink);
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 850;
    }

    .score-badge.pass {
      background: rgba(47, 127, 114, 0.13);
      color: var(--mint-dark);
    }

    .score-badge.fail {
      background: rgba(184, 58, 58, 0.12);
      color: var(--danger);
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    pre {
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #101713;
      color: #f2f6f1;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.45;
      max-height: 300px;
    }

    .log {
      min-height: 110px;
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .model-note {
      margin-top: 8px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1060px) {
      .app-shell,
      .split {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .metric-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .row {
        flex-direction: column;
      }

      .row > * {
        width: 100%;
      }
    }

    @media (max-width: 440px) {
      .metric-strip,
      .segmented {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <p class="eyebrow">OpenRouter Model Lab</p>
      <h1>Adversarial model benchmark</h1>
    </div>
    <div class="pill" id="statusPill">Idle</div>
  </header>

  <main class="app-shell">
    <aside class="controls">
      <form class="panel" id="runSetupForm" autocomplete="off" onsubmit="return false">
        <h2>Run Setup</h2>
        <div class="field">
          <label for="apiKey">OpenRouter API Key</label>
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-or-v1-...">
        </div>
        <div class="key-options">
          <label class="checkbox-line">
            <input id="rememberKey" type="checkbox">
            Remember locally
          </label>
          <button class="btn secondary small" id="toggleKey" type="button">Show</button>
        </div>
        <div class="field">
          <label for="modelSearch">Model Search</label>
          <input id="modelSearch" type="search" placeholder="openai, anthropic, google...">
        </div>
        <div class="field">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="">Loading models...</option>
          </select>
          <p class="model-note" id="modelNote">No model selected.</p>
        </div>
        <div class="field">
          <label for="manualModel">Manual Model ID</label>
          <input id="manualModel" type="text" placeholder="anthropic/claude-sonnet-4.6">
        </div>
        <div class="row">
          <button class="btn secondary" id="loadModels" type="button">Refresh Models</button>
          <button class="btn secondary" id="clearRun" type="button">Clear</button>
        </div>
      </form>

      <section class="panel">
        <h2>Benchmark</h2>
        <div class="segmented" role="radiogroup" aria-label="Preset">
          <input type="radio" name="preset" value="quick" id="presetQuick">
          <label for="presetQuick">Quick 14</label>
          <input type="radio" name="preset" value="broad" id="presetBroad" checked>
          <label for="presetBroad">Broad 28</label>
          <input type="radio" name="preset" value="deep" id="presetDeep">
          <label for="presetDeep">Deep 42</label>
        </div>
        <div class="row">
          <div class="field">
            <label for="temperature">Temp</label>
            <input id="temperature" type="number" min="0" max="2" step="0.1" value="0">
          </div>
          <div class="field">
            <label for="maxTokens">Max Tokens</label>
            <input id="maxTokens" type="number" min="64" max="4096" step="32" value="1200">
          </div>
        </div>
        <div class="field">
          <label for="concurrency">Parallel Requests</label>
          <select id="concurrency">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
          </select>
        </div>
        <div class="row">
          <button class="btn accent" id="runBenchmark" type="button">Run Benchmark</button>
          <button class="btn warn" id="stopBenchmark" type="button" disabled>Stop</button>
        </div>
      </section>

      <section class="panel compact">
        <h2>Export</h2>
        <div class="row">
          <button class="btn secondary" id="exportJson" type="button" disabled>Download JSON</button>
          <button class="btn secondary" id="copySummary" type="button" disabled>Copy Summary</button>
        </div>
      </section>
    </aside>

    <section class="main">
      <div class="metric-strip">
        <div class="metric">
          <span>Score</span>
          <strong id="overallScore">--</strong>
        </div>
        <div class="metric">
          <span>Local Avg</span>
          <strong id="localAverageScore">--</strong>
        </div>
        <div class="metric">
          <span>Grade</span>
          <strong id="grade">--</strong>
        </div>
        <div class="metric">
          <span>Cost</span>
          <strong id="cost">$0.00</strong>
        </div>
      </div>

      <section class="panel">
        <div class="task-head">
          <div>
            <h2>Progress</h2>
            <p class="model-note" id="progressText">Ready.</p>
          </div>
          <span class="score-badge" id="taskCount">0 tasks</span>
        </div>
        <div class="progress-shell" aria-label="Benchmark progress">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </section>

      <div class="split">
        <section class="panel">
          <h2>Category Profile</h2>
          <div class="category-grid" id="categoryGrid"></div>
        </section>

        <section class="panel narrative" id="narrativePanel">
          <h2>Result</h2>
          <div class="callout note">Run a benchmark to generate a profile.</div>
        </section>
      </div>

      <section class="panel">
        <h2>Task Results</h2>
        <div class="task-list" id="taskList"></div>
      </section>

      <section class="panel">
        <h2>Run Log</h2>
        <div class="log" id="log"></div>
      </section>
    </section>
  </main>

  <script>
    const OR_CHAT_URL = "https://openrouter.ai/api/v1/chat/completions";
    const OR_MODELS_URL = "https://openrouter.ai/api/v1/models";
    const APP_TITLE = "OpenRouter Model Lab";

    const $ = (selector) => document.querySelector(selector);
    const els = {
      apiKey: $("#apiKey"),
      rememberKey: $("#rememberKey"),
      toggleKey: $("#toggleKey"),
      modelSearch: $("#modelSearch"),
      modelSelect: $("#modelSelect"),
      manualModel: $("#manualModel"),
      modelNote: $("#modelNote"),
      loadModels: $("#loadModels"),
      clearRun: $("#clearRun"),
      temperature: $("#temperature"),
      maxTokens: $("#maxTokens"),
      concurrency: $("#concurrency"),
      runBenchmark: $("#runBenchmark"),
      stopBenchmark: $("#stopBenchmark"),
      exportJson: $("#exportJson"),
      copySummary: $("#copySummary"),
      statusPill: $("#statusPill"),
      overallScore: $("#overallScore"),
      localAverageScore: $("#localAverageScore"),
      grade: $("#grade"),
      cost: $("#cost"),
      progressText: $("#progressText"),
      progressFill: $("#progressFill"),
      taskCount: $("#taskCount"),
      categoryGrid: $("#categoryGrid"),
      narrativePanel: $("#narrativePanel"),
      taskList: $("#taskList"),
      log: $("#log")
    };

    let models = [];
    let activeAbort = null;
    let lastRun = null;
    let running = false;

    const categories = [
      "Reasoning and math",
      "Code and data",
      "Instruction robustness",
      "Truthfulness and uncertainty",
      "Long context retrieval",
      "Multilingual control",
      "Constraint writing",
      "Planning judgment"
    ];

    function normalizeText(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^\w\s.$%/-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function rawText(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "string") return value;
      return JSON.stringify(value);
    }

    function answerText(parsed, raw) {
      if (!parsed) return raw;
      if (typeof parsed === "string") return parsed;
      if (Array.isArray(parsed)) return parsed.join(", ");
      for (const key of ["answer", "result", "final", "choice", "value", "date", "items", "total"]) {
        if (parsed[key] !== undefined) return rawText(parsed[key]);
      }
      return rawText(parsed);
    }

    function findJsonSlice(text) {
      const cleaned = String(text || "").trim().replace(/^```(?:json)?/i, "").replace(/```$/i, "").trim();
      if (!cleaned) return "";
      if (cleaned.startsWith("{") || cleaned.startsWith("[")) return cleaned;
      const starts = ["{", "["].map((char) => cleaned.indexOf(char)).filter((i) => i >= 0);
      if (!starts.length) return "";
      const start = Math.min(...starts);
      const opener = cleaned[start];
      const closer = opener === "{" ? "}" : "]";
      const end = cleaned.lastIndexOf(closer);
      return end > start ? cleaned.slice(start, end + 1) : "";
    }

    function parseMaybeJson(text) {
      const slice = findJsonSlice(text);
      if (!slice) return null;
      try {
        return JSON.parse(slice);
      } catch {
        return null;
      }
    }

    function pct(value) {
      return `${Math.round(value)}%`;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function includesAll(text, words) {
      const norm = normalizeText(text);
      return words.every((word) => norm.includes(normalizeText(word)));
    }

    function includesAny(text, words) {
      const norm = normalizeText(text);
      return words.some((word) => norm.includes(normalizeText(word)));
    }

    function numberFrom(text) {
      const match = String(text).match(/-?\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : NaN;
    }

    function verdict(points, note, expected) {
      return { points, note, expected };
    }

    const checks = {
      exact(expected, aliases = []) {
        return ({ answer }) => {
          const norm = normalizeText(answer);
          const accepted = [expected, ...aliases].map(normalizeText);
          return verdict(accepted.includes(norm) ? 10 : 0, accepted.includes(norm) ? "Exact match." : "Expected a different exact answer.", expected);
        };
      },
      contains(expected, words, minHits = words.length) {
        return ({ answer }) => {
          const norm = normalizeText(answer);
          const hits = words.filter((word) => norm.includes(normalizeText(word))).length;
          return verdict(hits >= minHits ? 10 : Math.round((hits / minHits) * 7), `${hits}/${minHits} required signals found.`, expected);
        };
      },
      number(expected, tolerance = 0) {
        return ({ answer }) => {
          const n = numberFrom(answer);
          const ok = Number.isFinite(n) && Math.abs(n - expected) <= tolerance;
          return verdict(ok ? 10 : 0, ok ? "Numeric answer accepted." : "Numeric answer missed.", String(expected));
        };
      },
      fraction(expectedWords) {
        return ({ answer }) => {
          const norm = normalizeText(answer);
          const ok = expectedWords.some((word) => norm.includes(normalizeText(word)));
          return verdict(ok ? 10 : 0, ok ? "Accepted representation." : "Expected fraction or decimal equivalent.", expectedWords[0]);
        };
      }
    };

    function suite(level) {
      if (level === "quick") return ["quick", "broad", "deep"];
      if (level === "broad") return ["broad", "deep"];
      return ["deep"];
    }

    function approxNumber(expected, tolerance = 0.001) {
      return ({ answer }) => {
        const n = numberFrom(String(answer).replace(/,/g, ""));
        const ok = Number.isFinite(n) && Math.abs(n - expected) <= tolerance;
        return verdict(ok ? 10 : 0, ok ? "Numeric answer accepted." : "Expected a tighter numeric answer.", String(expected));
      };
    }

    function exactNormalized(expected, aliases = []) {
      return ({ answer }) => {
        const compact = normalizeText(answer).replace(/\s+/g, "");
        const accepted = [expected, ...aliases].map((value) => normalizeText(value).replace(/\s+/g, ""));

    function arrayExact(expected) {
      return ({ parsed, answer }) => {
        const arr = Array.isArray(parsed?.answer)
          ? parsed.answer.map(String)
          : String(answer).split(/[,>\n]/).map((item) => item.trim()).filter(Boolean);
        const got = arr.map(normalizeText).join("|");
        const want = expected.map(normalizeText).join("|");
        return verdict(got === want ? 10 : 0, "Expected exact ordered list.", JSON.stringify(expected));
      };
    }

    function arraySet(expected) {
      return ({ parsed, answer }) => {
        const arr = Array.isArray(parsed?.answer)
          ? parsed.answer.map(String)
          : (String(answer).match(/[A-Z][A-Z0-9-]*/g) || []);
        const got = arr.map(normalizeText).sort().join("|");
        const want = expected.map(normalizeText).sort().join("|");
        return verdict(got === want ? 10 : 0, "Expected exact set of items.", JSON.stringify(expected));
      };
    }

        prompt: "A migration has three options. Big bang: 2h, rollback hard, affects all users. Parallel run: 8h, rollback easy, affects 5% pilot first. Freeze and wait: 0h now, but unsupported system risk remains high. Goal: minimize blast radius while still making progress this week. What option should be chosen first? Return only JSON: {\"answer\":\"<option>\",\"confidence\":0-100}.",
        check: checks.contains("Parallel run with a small pilot first.", ["parallel", "pilot"], 2)
      }
    ];

    function selectedPreset() {
      return document.querySelector("input[name='preset']:checked")?.value || "broad";
    }

    function selectedTasks() {
      const preset = selectedPreset();
      return taskBank.filter((task) => task.presets.includes(preset));
    }

    function selectedModelId() {
      return els.manualModel.value.trim() || els.modelSelect.value.trim();
    }

    function headers() {
      const referer = location.origin && location.origin !== "null" ? location.origin : "http://localhost";
      return {
        "Authorization": `Bearer ${els.apiKey.value.trim()}`,
        "Content-Type": "application/json",
        "HTTP-Referer": referer,
        "X-OpenRouter-Title": APP_TITLE
      };
    }

    function modelHeaders() {
      const h = { "Content-Type": "application/json" };
      const key = els.apiKey.value.trim();
      if (key) h.Authorization = `Bearer ${key}`;
      return h;
    }

    function setStatus(text, mode = "") {
      els.statusPill.textContent = text;
      els.statusPill.className = `pill ${mode}`.trim();
    }

    function log(message) {
      const time = new Date().toLocaleTimeString();
      const div = document.createElement("div");
      div.textContent = `[${time}] ${message}`;
      els.log.prepend(div);
    }

    function formatCost(cost) {
      if (!Number.isFinite(cost) || cost <= 0) return "$0.00";
      if (cost < 0.01) return `$${cost.toFixed(4)}`;
      return `$${cost.toFixed(2)}`;
    }

    function formatPricePerMillion(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return "$0";
      return `$${(n * 1000000).toFixed(n * 1000000 >= 1 ? 2 : 4)}/M`;
    }

    function modelLabel(model) {
      const name = model.name || model.id;
      const context = model.context_length || model.top_provider?.context_length;
      return `${name} (${model.id}${context ? `, ${context.toLocaleString()} ctx` : ""})`;
    }

    function renderModels() {
      const q = normalizeText(els.modelSearch.value);
      const selected = els.modelSelect.value;
      const filtered = models
        .filter((model) => {
          const modality = model.architecture?.modality || "";
          const outputs = model.architecture?.output_modalities || [];
          const supportsText = !outputs.length || outputs.includes("text") || modality.includes("text");
          if (!supportsText) return false;
          if (!q) return true;
          return normalizeText(`${model.id} ${model.name} ${model.description}`).includes(q);
        })
        .slice(0, 300);

      els.modelSelect.innerHTML = filtered.length
        ? `<option value="">Select a model</option>${filtered.map((model) => `<option value="${escapeHtml(model.id)}">${escapeHtml(modelLabel(model))}</option>`).join("")}`
        : "<option value=\"\">No matching models</option>";
      if (selected && filtered.some((model) => model.id === selected)) {
        els.modelSelect.value = selected;
      } else if (filtered.length === 1) {
        els.modelSelect.value = filtered[0].id;
      }
      updateModelNote();
    }

    function updateModelNote() {
      const id = selectedModelId();
      const model = models.find((item) => item.id === id);
      if (!id) {
        els.modelNote.textContent = "No model selected.";
        return;
      }
      if (!model) {
        els.modelNote.textContent = `Manual model: ${id}`;
        return;
      }
      const prompt = formatPricePerMillion(model.pricing?.prompt);
      const completion = formatPricePerMillion(model.pricing?.completion);
      const context = model.context_length || model.top_provider?.context_length || "unknown";
      const contextText = Number.isFinite(Number(context)) ? Number(context).toLocaleString() : "unknown";
      els.modelNote.textContent = `${model.id} | context ${contextText} | input ${prompt} | output ${completion}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadModels() {
      els.loadModels.disabled = true;
      setStatus("Loading models", "running");
      try {
        const res = await fetch(OR_MODELS_URL, { headers: modelHeaders() });
        if (!res.ok) throw new Error(await readableError(res));
        const data = await res.json();
        models = Array.isArray(data.data) ? data.data : [];
        models.sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id));
        renderModels();
        setStatus("Models loaded");
        log(`Loaded ${models.length} models.`);
      } catch (error) {
        setStatus("Model load failed", "error");
        els.modelSelect.innerHTML = "<option value=\"\">Type a model ID below</option>";
        log(`${error.message || "Model load failed."} You can still type a model ID manually.`);
      } finally {
        els.loadModels.disabled = false;
      }
    }

    async function readableError(res) {
      const text = await res.text();
      try {
        const json = JSON.parse(text);
        return json.error?.message || json.message || `${res.status} ${res.statusText}`;
      } catch {
        return text || `${res.status} ${res.statusText}`;
      }
    }

    function scoreTask(task, raw, meta = {}) {
      const parsed = task.requiresJson === false ? null : parseMaybeJson(raw);
      const answer = task.requiresJson === false ? raw : answerText(parsed, raw);
      let scored;
      try {
        scored = task.check({ parsed, answer, raw, meta });
      } catch (error) {
        scored = verdict(0, `Scoring error: ${error.message}`, "See test definition.");
      }

      const max = 10;
      const structurePoints = task.requiresJson === false ? 0 : (parsed ? 1.5 : 0);
      const contentPoints = clamp(Number(scored.points) || 0, 0, max);
      const points = task.requiresJson === false
        ? contentPoints
        : clamp(contentPoints * 0.85 + structurePoints, 0, max);

      return {
        taskId: task.id,
        title: task.title,
        category: task.category,
        max,
        points,
        percent: points / max * 100,
        expected: scored.expected,
        note: scored.note,
        parsedOk: task.requiresJson === false ? true : Boolean(parsed),
        answer,
        raw,
        usage: meta.usage || null,
        latencyMs: meta.latencyMs || 0,
        error: meta.error || null
      };
    }

    async function callModel(task, signal) {
      const started = performance.now();
      const body = {
        model: selectedModelId(),
        messages: [
          {
            role: "system",
            content: "You are being benchmarked. Follow the user's requested format exactly. Think privately. Return only the requested answer format with no markdown unless the prompt asks otherwise."
          },
          { role: "user", content: task.prompt }
        ],
        temperature: Number(els.temperature.value),
        max_tokens: Number(els.maxTokens.value),
        stream: false
      };

      const res = await fetch(OR_CHAT_URL, {
        method: "POST",
        headers: headers(),
        body: JSON.stringify(body),
        signal
      });
      const latencyMs = performance.now() - started;
      if (!res.ok) {
        const error = new Error(await readableError(res));
        error.status = res.status;
        throw error;
      }
      const data = await res.json();
      const content = data.choices?.[0]?.message?.content ?? "";
      return { content, usage: data.usage || null, latencyMs };
    }

    async function runBenchmark() {
      const apiKey = els.apiKey.value.trim();
      const model = selectedModelId();
      if (!apiKey) {
        setStatus("Missing key", "error");
        log("Add an OpenRouter API key first.");
        return;
      }
      if (!model) {
        setStatus("Missing model", "error");
        log("Select a model or type a model ID.");
        return;
      }

      running = true;
      activeAbort = new AbortController();
      const tasks = selectedTasks();
      const concurrency = clamp(Number(els.concurrency.value) || 1, 1, 3);
      const startedAt = new Date();
      const results = [];
      let completed = 0;
      let totalCost = 0;
      let totalTokens = 0;
      let queueIndex = 0;

      setRunningUi(true);
      resetResults();
      els.taskCount.textContent = `${tasks.length} tasks`;
      setStatus("Running", "running");
      log(`Running ${tasks.length} tasks on ${model}.`);
      renderTaskPlaceholders(tasks);

      async function worker() {
        while (queueIndex < tasks.length && !activeAbort.signal.aborted) {
          const task = tasks[queueIndex++];
          updateTaskStatus(task.id, "Running");
          try {
            const meta = await callModel(task, activeAbort.signal);
            const result = scoreTask(task, meta.content, meta);
            results.push(result);
            totalCost += Number(meta.usage?.cost || 0);
            totalTokens += Number(meta.usage?.total_tokens || 0);
            completed += 1;
            updateTaskResult(result);
            updateProgress(completed, tasks.length, totalCost);
            log(`Scored ${task.title}: ${Math.round(result.percent)}%.`);
          } catch (error) {
            const result = scoreTask(task, "", { error: error.message, latencyMs: 0 });
            results.push(result);
            completed += 1;
            updateTaskResult(result);
            updateProgress(completed, tasks.length, totalCost);
            log(`${task.title} failed: ${error.message}`);
            if ([401, 402, 403].includes(error.status)) {
              activeAbort.abort();
              log("Stopped after an authorization or credit error.");
            }
            if (activeAbort.signal.aborted) break;
          }
        }
      }

      try {
        await Promise.all(Array.from({ length: concurrency }, worker));
        const completedAt = new Date();
        const summary = summarizeRun({
          model,
          preset: selectedPreset(),
          startedAt,
          completedAt,
          results,
          totalCost,
          totalTokens
        });
        lastRun = summary;
        renderSummary(summary);
        setStatus(activeAbort.signal.aborted ? "Stopped" : "Complete", activeAbort.signal.aborted ? "error" : "");
        log(activeAbort.signal.aborted ? "Run stopped." : `Run complete: ${Math.round(summary.score)}%.`);
      } finally {
        running = false;
        activeAbort = null;
        setRunningUi(false);
      }
    }

    function setRunningUi(isRunning) {
      els.runBenchmark.disabled = isRunning;
      els.stopBenchmark.disabled = !isRunning;
      els.loadModels.disabled = isRunning;
      els.clearRun.disabled = isRunning;
      els.exportJson.disabled = isRunning || !lastRun;
      els.copySummary.disabled = isRunning || !lastRun;
    }

    function resetResults() {
      els.overallScore.textContent = "--";
      els.localAverageScore.textContent = "--";
      els.grade.textContent = "--";
      els.cost.textContent = "$0.00";
      els.progressText.textContent = "Starting...";
      els.progressFill.style.width = "0%";
      els.categoryGrid.innerHTML = "";
      els.narrativePanel.innerHTML = "<h2>Result</h2><div class=\"callout note\">Run in progress.</div>";
      els.taskList.innerHTML = "";
      lastRun = null;
      els.exportJson.disabled = true;
      els.copySummary.disabled = true;
    }

    function renderTaskPlaceholders(tasks) {
      els.taskList.innerHTML = tasks.map((task) => `
        <article class="task-card" data-task="${escapeHtml(task.id)}">
          <div class="task-head">
            <div class="task-title">
              <b>${escapeHtml(task.title)}</b>
              <span>${escapeHtml(task.category)}</span>
            </div>
            <span class="score-badge">Queued</span>
          </div>
          <p>SOTA stress task. Scored by deterministic checks in this page.</p>
        </article>
      `).join("");
    }

    function updateTaskStatus(taskId, status) {
      const card = els.taskList.querySelector(`[data-task="${CSS.escape(taskId)}"]`);
      const badge = card?.querySelector(".score-badge");
      if (badge) badge.textContent = status;
    }

    function updateTaskResult(result) {
      const card = els.taskList.querySelector(`[data-task="${CSS.escape(result.taskId)}"]`);
      if (!card) return;
      const badgeClass = result.percent >= 70 ? "pass" : result.percent >= 40 ? "" : "fail";
      card.innerHTML = `
        <div class="task-head">
          <div class="task-title">
            <b>${escapeHtml(result.title)}</b>
            <span>${escapeHtml(result.category)}</span>
          </div>
          <span class="score-badge ${badgeClass}">${Math.round(result.percent)}%</span>
        </div>
        <p>${escapeHtml(result.note || "")} ${result.parsedOk ? "" : "JSON format missed."}</p>
        ${result.error ? `<div class="callout bad">${escapeHtml(result.error)}</div>` : ""}
        <details>
          <summary>Details</summary>
          <p><b>Expected:</b> ${escapeHtml(result.expected || "")}</p>
          <p><b>Answer:</b> ${escapeHtml(result.answer || "")}</p>
          <pre>${escapeHtml(result.raw || "")}</pre>
        </details>
      `;
    }

    function updateProgress(completed, total, cost) {
      const progress = total ? completed / total * 100 : 0;
      els.progressFill.style.width = `${progress}%`;
      els.progressText.textContent = `${completed} of ${total} complete.`;
      els.cost.textContent = formatCost(cost);
    }

    function getRunHistory() {
      try {
        const history = JSON.parse(localStorage.getItem("openrouter_model_lab_history") || "[]");
        return Array.isArray(history) ? history : [];
      } catch {
        return [];
      }
    }

    function localAverageFor(preset) {
      const runs = getRunHistory().filter((run) => run.preset === preset && Number.isFinite(run.score));
      if (!runs.length) return null;
      const score = runs.reduce((sum, run) => sum + run.score, 0) / runs.length;
      const categoriesByName = {};
      categories.forEach((category) => {
        const values = runs
          .map((run) => run.categoryScores?.find((item) => item.category === category)?.score)
          .filter((value) => Number.isFinite(value));
        if (values.length) {
          categoriesByName[category] = values.reduce((sum, value) => sum + value, 0) / values.length;
        }
      });
      return { score, count: runs.length, categoriesByName };
    }

    function saveRunHistory(summary) {
      const history = getRunHistory();
      history.push({
        model: summary.model,
        preset: summary.preset,
        score: summary.score,
        grade: summary.grade,
        categoryScores: summary.categoryScores.map(({ category, score, count }) => ({ category, score, count })),
        completedAt: summary.completedAt.toISOString()
      });
      localStorage.setItem("openrouter_model_lab_history", JSON.stringify(history.slice(-60)));
    }

    function summarizeRun(run) {
      const max = run.results.reduce((sum, item) => sum + item.max, 0);
      const points = run.results.reduce((sum, item) => sum + item.points, 0);
      const score = max ? points / max * 100 : 0;
      const localAverage = localAverageFor(run.preset);
      const categoryScores = categories.map((category) => {
        const items = run.results.filter((item) => item.category === category);
        const itemMax = items.reduce((sum, item) => sum + item.max, 0);
        const itemPoints = items.reduce((sum, item) => sum + item.points, 0);
        const categoryScore = itemMax ? itemPoints / itemMax * 100 : 0;
        const localCategoryAverage = localAverage?.categoriesByName?.[category] ?? null;
        return {
          category,
          count: items.length,
          score: categoryScore,
          localAverage: localCategoryAverage,
          delta: Number.isFinite(localCategoryAverage) ? categoryScore - localCategoryAverage : null
        };
      }).filter((item) => item.count > 0);
      const jsonValidity = run.results.length ? run.results.filter((item) => item.parsedOk).length / run.results.length * 100 : 0;
      const avgLatency = run.results.length ? run.results.reduce((sum, item) => sum + item.latencyMs, 0) / run.results.length : 0;
      const grade = gradeFor(score);
      return {
        ...run,
        score,
        localAverageScore: localAverage?.score ?? null,
        localAverageCount: localAverage?.count ?? 0,
        categoryScores,
        jsonValidity,
        avgLatency,
        grade
      };
    }

    function gradeFor(score) {
      if (score >= 94) return "A+";
      if (score >= 88) return "A";
      if (score >= 80) return "B";
      if (score >= 70) return "C";
      if (score >= 58) return "D";
      return "F";
    }

    function renderSummary(summary) {
      els.overallScore.textContent = pct(summary.score);
      els.localAverageScore.textContent = Number.isFinite(summary.localAverageScore) ? pct(summary.localAverageScore) : "--";
      els.grade.textContent = summary.grade;
      els.cost.textContent = formatCost(summary.totalCost);
      els.taskCount.textContent = `${summary.results.length} tasks`;
      els.progressText.textContent = `${summary.model} | ${summary.preset} | ${Math.round(summary.avgLatency)} ms avg`;
      els.exportJson.disabled = false;
      els.copySummary.disabled = false;
      renderCategories(summary);
      renderNarrative(summary);
      saveRunHistory(summary);
    }

    function renderCategories(summary) {
      els.categoryGrid.innerHTML = summary.categoryScores.map((item) => {
        const cls = Number.isFinite(item.delta) && item.delta >= 8 ? "strong" : Number.isFinite(item.delta) && item.delta <= -8 ? "weak" : "";
        const comparisonText = Number.isFinite(item.delta)
          ? `${item.delta >= 0 ? "+" : ""}${Math.round(item.delta)} vs local avg | ${item.count} tasks`
          : `${item.count} tasks | no local avg yet`;
        return `
          <article class="category-card ${cls}">
            <span class="label">${escapeHtml(item.category)}</span>
            <strong>${pct(item.score)}</strong>
            <p>${escapeHtml(comparisonText)}</p>
            <div class="bar"><i style="--value:${clamp(item.score, 0, 100)}%"></i></div>
          </article>
        `;
      }).join("");
    }

    function renderNarrative(summary) {
      const hasLocalAverage = Number.isFinite(summary.localAverageScore);
      const delta = hasLocalAverage ? summary.score - summary.localAverageScore : null;
      const sorted = [...summary.categoryScores].sort((a, b) => {
        if (hasLocalAverage) return (b.delta ?? -999) - (a.delta ?? -999);
        return b.score - a.score;
      });
      const strengths = hasLocalAverage
        ? sorted.filter((item) => Number.isFinite(item.delta) && item.delta >= 5).slice(0, 3)
        : sorted.slice(0, 3);
      const weaknesses = hasLocalAverage
        ? sorted.filter((item) => Number.isFinite(item.delta) && item.delta <= -5).slice(-3).reverse()
        : [...summary.categoryScores].sort((a, b) => a.score - b.score).slice(0, 3);
      const failed = summary.results
        .filter((item) => item.percent < 50)
        .sort((a, b) => a.percent - b.percent)
        .slice(0, 5);

      const headline = hasLocalAverage
        ? delta >= 8
          ? `This run is clearly above your local average for the ${summary.preset} suite by ${Math.round(delta)} points across ${summary.localAverageCount} prior run${summary.localAverageCount === 1 ? "" : "s"}.`
          : delta <= -8
            ? `This run is below your local average for the ${summary.preset} suite by ${Math.abs(Math.round(delta))} points across ${summary.localAverageCount} prior run${summary.localAverageCount === 1 ? "" : "s"}.`
            : `This run is close to your local average for the ${summary.preset} suite, within ${Math.abs(Math.round(delta))} points across ${summary.localAverageCount} prior run${summary.localAverageCount === 1 ? "" : "s"}.`
        : `This is your first stored ${summary.preset} run, so there is no honest local average yet. Run another model on the same preset to get a real comparison.`;

      const strengthsText = strengths.length
        ? strengths.map((item) => {
          const suffix = hasLocalAverage && Number.isFinite(item.delta) ? `, ${item.delta >= 0 ? "+" : ""}${Math.round(item.delta)} vs local` : "";
          return `${item.category} (${pct(item.score)}${suffix})`;
        }).join("; ")
        : "No category beat the local average by 5 points or more.";

      const weaknessesText = weaknesses.length
        ? weaknesses.map((item) => {
          const suffix = hasLocalAverage && Number.isFinite(item.delta) ? `, ${Math.round(item.delta)} vs local` : "";
          return `${item.category} (${pct(item.score)}${suffix})`;
        }).join("; ")
        : "No category trailed the local average by 5 points or more.";

      const failedText = failed.length
        ? failed.map((item) => `${item.title}: ${Math.round(item.percent)}%`).join("; ")
        : "No task scored below 50%.";

      const costLine = summary.totalCost > 0
        ? `${formatCost(summary.totalCost)} reported cost, ${summary.totalTokens.toLocaleString()} tokens, ${Math.round(summary.avgLatency)} ms average latency.`
        : `${summary.totalTokens.toLocaleString()} tokens reported, ${Math.round(summary.avgLatency)} ms average latency.`;

      els.narrativePanel.innerHTML = `
        <h2>Result</h2>
        <div class="callout">${escapeHtml(headline)}</div>
        <div class="callout note">Comparison is based only on runs stored locally in this browser. It is not a live leaderboard and does not use invented baseline numbers.</div>
        <p><b>Strong spots:</b> ${escapeHtml(strengthsText)}</p>
        <p><b>Weak spots:</b> ${escapeHtml(weaknessesText)}</p>
        <p><b>Lowest tasks:</b> ${escapeHtml(failedText)}</p>
        <p><b>Run shape:</b> JSON validity ${pct(summary.jsonValidity)}, ${escapeHtml(costLine)}</p>
      `;
    }

    function clearRun() {
      lastRun = null;
      resetResults();
      els.taskCount.textContent = `${selectedTasks().length} tasks`;
      els.progressText.textContent = "Ready.";
      els.narrativePanel.innerHTML = "<h2>Result</h2><div class=\"callout note\">Run a benchmark to generate a profile.</div>";
      setStatus("Idle");
      log("Cleared current run.");
    }

    function exportJson() {
      if (!lastRun) return;
      const blob = new Blob([JSON.stringify(lastRun, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `openrouter-model-lab-${lastRun.model.replace(/[^\w.-]+/g, "_")}-${lastRun.preset}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function copySummary() {
      if (!lastRun) return;
      const lines = [
        `Model: ${lastRun.model}`,
        `Preset: ${lastRun.preset}`,
        `Score: ${pct(lastRun.score)} (${lastRun.grade})`,
        `Local average: ${Number.isFinite(lastRun.localAverageScore) ? `${pct(lastRun.localAverageScore)} across ${lastRun.localAverageCount} prior run(s)` : "not available yet"}`,
        `JSON validity: ${pct(lastRun.jsonValidity)}`,
        `Average latency: ${Math.round(lastRun.avgLatency)} ms`
      ];
      await navigator.clipboard.writeText(lines.join("\n"));
      log("Summary copied.");
    }

    function saveKeyPreference() {
      if (els.rememberKey.checked) {
        localStorage.setItem("openrouter_model_lab_key", els.apiKey.value);
      } else {
        localStorage.removeItem("openrouter_model_lab_key");
      }
      localStorage.setItem("openrouter_model_lab_remember", els.rememberKey.checked ? "1" : "0");
    }

    function restorePreferences() {
      const remember = localStorage.getItem("openrouter_model_lab_remember") === "1";
      els.rememberKey.checked = remember;
      if (remember) {
        els.apiKey.value = localStorage.getItem("openrouter_model_lab_key") || "";
      }
      els.taskCount.textContent = `${selectedTasks().length} tasks`;
    }

    els.loadModels.addEventListener("click", loadModels);
    els.runBenchmark.addEventListener("click", runBenchmark);
    els.stopBenchmark.addEventListener("click", () => {
      if (activeAbort) activeAbort.abort();
      setStatus("Stopping", "error");
    });
    els.clearRun.addEventListener("click", clearRun);
    els.exportJson.addEventListener("click", exportJson);
    els.copySummary.addEventListener("click", copySummary);
    els.modelSearch.addEventListener("input", renderModels);
    els.modelSelect.addEventListener("change", () => {
      if (els.modelSelect.value) els.manualModel.value = "";
      updateModelNote();
    });
    els.manualModel.addEventListener("input", () => {
      if (els.manualModel.value.trim()) els.modelSelect.value = "";
      updateModelNote();
    });
    els.apiKey.addEventListener("input", saveKeyPreference);
    els.rememberKey.addEventListener("change", saveKeyPreference);
    els.toggleKey.addEventListener("click", () => {
      const showing = els.apiKey.type === "text";
      els.apiKey.type = showing ? "password" : "text";
      els.toggleKey.textContent = showing ? "Show" : "Hide";
    });
    document.querySelectorAll("input[name='preset']").forEach((input) => {
      input.addEventListener("change", () => {
        els.taskCount.textContent = `${selectedTasks().length} tasks`;
        if (!running && !lastRun) {
          els.progressText.textContent = "Ready.";
        }
      });
    });

    restorePreferences();
    log("Ready.");
    loadModels();
  </script>
</body>
</html>
